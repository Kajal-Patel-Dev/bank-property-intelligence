{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">

        User Status Management

    </h2>

    <div class="card shadow border-0">

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    {% for user in users %}

                    <tr>

                        <td>{{ user[0] }}</td>

                        <td>{{ user[1] }}</td>

                        <td>{{ user[2] }}</td>

                        <td>{{ user[5] }}</td>

                        <td>

                            {% if user[6] == 'Active' %}

                            <span class="badge bg-success">

                                Active

                            </span>

                            {% else %}

                            <span class="badge bg-danger">

                                Inactive

                            </span>

                            {% endif %}

                        </td>

                        <td>

                            <a href="/admin/change-user-status/{{ user[0] }}"
                               class="btn btn-warning btn-sm">

                               Change Status

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
