<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bank Login</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">



<style>


body{

min-height:100vh;
background:#f1f5f9;
font-family:'Segoe UI',sans-serif;

display:flex;
align-items:center;

}



.login-wrapper{

width:100%;

}



.login-card{

border:none;
border-radius:25px;
overflow:hidden;

box-shadow:
0 20px 50px rgba(0,0,0,.15);

}



/* LEFT */

.login-left{

background:
linear-gradient(
135deg,
#0f172a,
#1d4ed8
);

color:white;
padding:50px;

height:100%;

}


.login-left h1{

font-weight:800;

}


.login-left p{

color:#dbeafe;
line-height:1.8;

}



.feature{

margin-top:30px;

}



.feature i{

font-size:25px;
margin-right:10px;

}





/* RIGHT */


.login-right{

padding:50px;

background:white;

}



.logo{

width:70px;
height:70px;

background:#dbeafe;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:35px;
color:#2563eb;

margin:auto;

}



.form-control{

border-radius:12px;
padding:12px;

}



.btn-login{

background:#2563eb;
color:white;

border-radius:25px;
padding:12px;

font-weight:600;

}



.btn-login:hover{

background:#1d4ed8;
color:white;

}


a{

text-decoration:none;

}


</style>


</head>



<body>


<div class="container login-wrapper">


<div class="row justify-content-center">



<div class="col-lg-9">



<div class="card login-card">



<div class="row g-0">



<!-- LEFT PANEL -->


<div class="col-lg-6">


<div class="login-left">



<h1>

Bank Property System

</h1>



<p class="mt-4">

Secure platform to manage property,
agents, reports and banking operations.

</p>




<div class="feature">


<p>

<i class="bi bi-shield-check"></i>

Secure Authentication

</p>


<p>

<i class="bi bi-building"></i>

Property Intelligence

</p>



<p>

<i class="bi bi-graph-up"></i>

Smart Analytics

</p>


</div>



</div>


</div>







<!-- LOGIN -->


<div class="col-lg-6">



<div class="login-right">



<div class="text-center">


<div class="logo">

<i class="bi bi-person-lock"></i>

</div>


<h3 class="mt-3 fw-bold">

Welcome Back

</h3>


<p class="text-muted">

Login to continue

</p>


</div>





<form method="POST">



<div class="mb-3">


<label class="fw-semibold">

Email

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-envelope"></i>

</span>


<input

type="email"

class="form-control"

name="email"

required>


</div>


</div>







<div class="mb-3">


<label class="fw-semibold">

Password

</label>


<div class="input-group">


<span class="input-group-text">

<i class="bi bi-lock"></i>

</span>



<input

type="password"

id="password"

class="form-control"

name="password"

required>



<button

type="button"

class="btn btn-light"

onclick="showPass()">

<i class="bi bi-eye"></i>

</button>


</div>


</div>






<div class="d-flex justify-content-between mb-3">


<a href="/forgot-password">

Forgot Password?

</a>



</div>





<button

class="btn btn-login w-100">

<i class="bi bi-box-arrow-in-right"></i>

Login

</button>






<div class="text-center mt-4">


Don't have account?


<a href="/register"
class="fw-bold">

Create Account

</a>


</div>




</form>




</div>


</div>



</div>



</div>



</div>



</div>







<script>


function showPass(){


let p=document.getElementById("password");


if(p.type==="password"){

p.type="text";

}else{

p.type="password";

}


}


</script>



</body>


</html>
