{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">

        Notifications

    </h2>

    <div class="row">

        {% for note in notifications %}

        <div class="col-md-6 mb-4">

            <div class="card shadow border-0">

                <div class="card-body">

                    <h5 class="fw-bold">

                        {{ note[1] }}

                    </h5>

                    <p>

                        {{ note[2] }}

                    </p>

                    <small class="text-muted">

                        {{ note[3] }}

                    </small>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
