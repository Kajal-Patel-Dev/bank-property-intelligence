<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Forgot Password

    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            background:#f4f6f9;
        }

        .forgot-card{

            margin-top:120px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow border-0 forgot-card">

                <div class="card-header bg-danger text-white text-center">

                    <h3>

                        Forgot Password

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label>Email</label>

                            <input type="email"
                                   class="form-control"
                                   name="email">

                        </div>

                        <div class="mb-3">

                            <label>New Password</label>

                            <input type="password"
                                   class="form-control"
                                   name="new_password">

                        </div>

                        <button class="btn btn-danger w-100">

                            Reset Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
