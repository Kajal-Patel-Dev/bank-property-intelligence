{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">

        Login Activity

    </h2>

    <div class="card shadow border-0">

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Login Time</th>

                    </tr>

                </thead>

                <tbody>

                    {% for log in logs %}

                    <tr>

                        <td>{{ log[1] }}</td>

                        <td>{{ log[2] }}</td>

                        <td>

                            <span class="badge bg-primary">

                                {{ log[3] }}

                            </span>

                        </td>

                        <td>{{ log[4] }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
