{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">

        Contact Messages

    </h2>

    <div class="card shadow border-0">

        <div class="card-body">

            <table class="table table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Message</th>

                    </tr>

                </thead>

                <tbody>

                    {% for msg in messages %}

                    <tr>

                        <td>{{ msg[1] }}</td>

                        <td>{{ msg[2] }}</td>

                        <td>{{ msg[3] }}</td>

                        <td>{{ msg[4] }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
