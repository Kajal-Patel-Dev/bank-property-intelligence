{% extends 'base.html' %}

{% block content %}


<style>

body{
    background:#f6f8fc;
}


.profile-card{
    border:none;
    border-radius:22px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
    overflow:hidden;
}


.profile-header{

    background:linear-gradient(
    135deg,
    #0f172a,
    #2563eb
    );

    color:white;
    padding:35px;

}



.avatar{

width:90px;
height:90px;

border-radius:50%;

background:white;

color:#2563eb;

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

font-weight:bold;

margin:auto;

}



.info-box{

background:#f8fafc;

border-radius:15px;

padding:18px;

margin-bottom:15px;

}



label{

font-weight:600;

color:#475569;

}



.form-control{

border-radius:12px;

padding:12px;

}



.btn{

border-radius:12px;

padding:12px 25px;

font-weight:600;

}



.badge{

font-size:14px;

padding:8px 15px;

}


</style>





<div class="container-fluid py-4">


<div class="row justify-content-center">



<div class="col-lg-8">



<div class="card profile-card">





<div class="profile-header text-center">


<div class="avatar">

{{ user[1][0]|upper }}

</div>


<h3 class="mt-3 mb-1">

{{ user[1] }}

</h3>


<span class="badge bg-success">

Agent Account

</span>


<p class="mt-3 mb-0">

Property Management System

</p>


</div>







<div class="card-body p-4">



<div class="row mb-4">



<div class="col-md-4">


<div class="info-box text-center">


<i class="bi bi-envelope fs-3 text-primary"></i>


<h6 class="mt-2">
Email
</h6>


<p class="mb-0">

{{ user[2] }}

</p>


</div>


</div>





<div class="col-md-4">


<div class="info-box text-center">


<i class="bi bi-telephone fs-3 text-success"></i>


<h6 class="mt-2">
Mobile
</h6>


<p class="mb-0">

{{ user[3] }}

</p>


</div>


</div>






<div class="col-md-4">


<div class="info-box text-center">


<i class="bi bi-shield-check fs-3 text-warning"></i>


<h6 class="mt-2">
Status
</h6>


<p class="mb-0">

Active

</p>


</div>


</div>



</div>







<form method="POST">



<h5 class="fw-bold mb-3">

Update Profile

</h5>




<div class="row">



<div class="col-md-6 mb-3">


<label>
Full Name
</label>


<input

type="text"

class="form-control"

name="name"

value="{{user[1]}}"

required>


</div>






<div class="col-md-6 mb-3">


<label>
Email Address
</label>


<input

type="email"

class="form-control"

name="email"

value="{{user[2]}}"

required>


</div>





</div>






<div class="mb-3">


<label>

Mobile Number

</label>


<input

type="text"

class="form-control"

name="mobile"

value="{{user[3]}}"

required>


</div>







<div class="text-end">


<button class="btn btn-primary">


<i class="bi bi-save"></i>

Save Changes


</button>


</div>





</form>







</div>



</div>



</div>



</div>


</div>



{% endblock %}
