<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Bank Property System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    min-height:100vh;
    background:#f1f5f9;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    align-items:center;
}

.register-wrapper{
    width:100%;
}

.register-card{
    border:none;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

/* LEFT PANEL */

.register-left{
    background:linear-gradient(
    135deg,
    #0f172a,
    #1d4ed8
    );
    color:white;
    padding:50px;
    height:100%;
}

.register-left h1{
    font-weight:800;
}

.register-left p{
    color:#dbeafe;
    line-height:1.8;
}

.feature{
    margin-top:30px;
}

.feature i{
    font-size:24px;
    margin-right:10px;
}

/* RIGHT PANEL */

.register-right{
    background:white;
    padding:40px;
}

.logo{
    width:75px;
    height:75px;
    background:#dbeafe;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

.logo i{
    font-size:35px;
    color:#2563eb;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
}

.input-group-text{
    border-radius:12px 0 0 12px;
}

.btn-register{
    background:#2563eb;
    color:white;
    border-radius:25px;
    padding:12px;
    font-weight:600;
}

.btn-register:hover{
    background:#1d4ed8;
    color:white;
}

a{
    text-decoration:none;
}

.form-check-label{
    font-size:14px;
}

</style>
</head>

<body>

<div class="container register-wrapper">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card register-card">

<div class="row g-0">

<!-- LEFT SECTION -->

<div class="col-lg-6">

<div class="register-left">

<h1>Bank Property System</h1>

<p class="mt-4">
Create your account and access secure property intelligence,
analytics, reporting tools and banking operations.
</p>

<div class="feature">

<p>
<i class="bi bi-shield-check"></i>
Enterprise Security
</p>

<p>
<i class="bi bi-buildings"></i>
Property Management
</p>

<p>
<i class="bi bi-graph-up-arrow"></i>
Business Insights
</p>

<p>
<i class="bi bi-people"></i>
Team Collaboration
</p>

</div>

</div>

</div>

<!-- REGISTER FORM -->

<div class="col-lg-6">
<div class="register-right">
<div class="text-center">
<div class="logo">
<i class="bi bi-person-plus"></i>
</div>

<h3 class="mt-3 fw-bold">Create Account</h3>
<p class="text-muted">Register to continue</p>
</div>
<form method="POST">
<div class="mb-3">

<label class="fw-semibold">Full Name</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-person"></i>
</span>
<input
type="text"
class="form-control"
name="name"
placeholder="Enter Full Name"
required>
</div>
</div>

<div class="mb-3">

<label class="fw-semibold">
Email
</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input
type="email"
class="form-control"
name="email"
placeholder="Enter Email"
required>

</div>

</div>

<div class="mb-3">

<label class="fw-semibold">
Mobile Number
</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-phone"></i>
</span>

<input
type="text"
class="form-control"
name="mobile"
placeholder="Enter Mobile Number">

</div>

</div>

<div class="mb-3">

<label class="fw-semibold">
Role
</label>

<select class="form-select" name="role">

<option value="">Select Role</option>
<option>Admin</option>
<option>Agent</option>
<option>Team Member</option>

</select>

</div>

<div class="mb-3">

<label class="fw-semibold">
Password
</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input
type="password"
id="password"
class="form-control"
name="password"
required>

<button
type="button"
class="btn btn-light"
onclick="togglePassword('password')">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="mb-3">

<label class="fw-semibold">
Confirm Password
</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input
type="password"
id="confirmPassword"
class="form-control"
name="confirm_password"
required>

<button
type="button"
class="btn btn-light"
onclick="togglePassword('confirmPassword')">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
required>

<label class="form-check-label">

I agree to the
<a href="#">Terms & Conditions</a>

</label>

</div>

<button class="btn btn-register w-100">

<i class="bi bi-person-check"></i>

Create Account

</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="/login" class="fw-bold">

Login Here

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

function togglePassword(id){

let input = document.getElementById(id);

if(input.type==="password"){
    input.type="text";
}
else{
    input.type="password";
}

}

</script>

</body>
</html>
