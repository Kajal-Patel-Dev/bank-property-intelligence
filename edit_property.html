{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow border-0">

        <div class="card-header bg-success text-white">

            <h4>Edit Property</h4>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Property Name</label>

                    <input type="text"
                           class="form-control"
                           name="property_name"
                           value="{{ property[1] }}">

                </div>

                <div class="mb-3">

                    <label>Estimated Cost</label>

                    <input type="number"
                           class="form-control"
                           name="estimated_cost"
                           value="{{ property[7] }}">

                </div>

                <button class="btn btn-success">

                    Update Property

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
